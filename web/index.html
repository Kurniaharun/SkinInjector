<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#05030f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SkinJECT — by KurrXd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>
    <div class="grid-overlay"></div>
  </div>

  <div id="app" class="app">
    <header class="topbar glass-bar">
      <button type="button" id="btn-back" class="icon-btn hidden" aria-label="Kembali">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      </button>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
        </div>
        <div>
          <h1 class="logo">Skin<span>JECT</span></h1>
          <p class="tagline" id="page-sub">by KurrXd · v2.0</p>
        </div>
      </div>
      <button type="button" id="btn-status" class="icon-btn status-btn" aria-label="Status">
        <span class="status-dot"></span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
      </button>
    </header>

    <main id="main" class="main">
      <section id="view-home" class="view active">
        <div class="hero-card glass">
          <div class="hero-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></svg>
            MLBB Skin Injector
          </div>
          <h2>Pilih mode inject</h2>
          <p class="hero-desc">Browse hero, upgrade skin, atau inject langsung dari browser mobile.</p>
        </div>
        <nav class="menu-grid" id="menu-grid">
          <button class="menu-btn" data-mode="heroes">
            <span class="icon-box violet"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
            <span class="menu-text"><span class="menu-label">Browse Hero</span><span class="menu-hint">130+ hero</span></span>
          </button>
          <button class="menu-btn" data-mode="roles">
            <span class="icon-box blue"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg></span>
            <span class="menu-text"><span class="menu-label">Browse Role</span><span class="menu-hint">Tank, Mage, dll</span></span>
          </button>
          <button class="menu-btn" data-mode="search">
            <span class="icon-box cyan"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
            <span class="menu-text"><span class="menu-label">Search Skin</span><span class="menu-hint">Cari cepat</span></span>
          </button>
          <button class="menu-btn accent" data-mode="upgrade">
            <span class="icon-box pink"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span>
            <span class="menu-text"><span class="menu-label">Upgrade Skin</span><span class="menu-hint">324 upgrade</span></span>
          </button>
          <button class="menu-btn" data-mode="custom">
            <span class="icon-box amber"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span>
            <span class="menu-text"><span class="menu-label">Custom Bundle</span><span class="menu-hint">Paket custom</span></span>
          </button>
          <button class="menu-btn" data-mode="effects">
            <span class="icon-box green"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg></span>
            <span class="menu-text"><span class="menu-label">Effects</span><span class="menu-hint">Recall, emote</span></span>
          </button>
        </nav>
      </section>

      <section id="view-list" class="view">
        <div class="search-bar glass" id="list-search-wrap">
          <svg class="search-ico" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="list-search" placeholder="Filter..." autocomplete="off" enterkeyhint="search" />
        </div>
        <div id="list-items" class="list-items"></div>
      </section>

      <section id="view-skins" class="view">
        <div class="search-bar glass" id="skin-search-wrap">
          <svg class="search-ico" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="skin-search" placeholder="Filter skin..." autocomplete="off" />
        </div>
        <div id="skin-count" class="skin-count hidden"></div>
        <div id="skin-grid" class="skin-grid"></div>
      </section>

      <section id="view-status" class="view">
        <div class="status-card glass" id="status-card">
          <div class="loader"></div>
          <p>Memuat status...</p>
        </div>
      </section>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card glass">
      <button type="button" id="modal-close" class="modal-close" aria-label="Tutup">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <div class="modal-banner-wrap">
        <img id="modal-img" src="" alt="" class="modal-banner" />
        <div class="modal-banner-shade"></div>
      </div>
      <div class="modal-body">
        <div class="modal-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/><path d="m14 4 6 6"/></svg>
          Konfirmasi Inject
        </div>
        <h3 id="modal-title" class="modal-title">Inject skin ini?</h3>
        <p id="modal-sub" class="modal-sub"></p>
        <div class="modal-actions">
          <button type="button" id="modal-no" class="btn btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            Batal
          </button>
          <button type="button" id="modal-yes" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
            Inject
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <div id="loading" class="loading-overlay hidden">
    <div class="loader lg"></div>
    <p id="loading-text">Memuat...</p>
  </div>

  <script src="/js/app.js" type="module"></script>
</body>
</html>
