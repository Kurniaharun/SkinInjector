<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0618" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SkinJECT — by KurrXd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div id="app" class="app">
    <header class="topbar">
      <button type="button" id="btn-back" class="icon-btn hidden" aria-label="Kembali">←</button>
      <div class="brand">
        <h1 class="logo">Skin<span>JECT</span></h1>
        <p class="tagline">by KurrXd · v2.0</p>
      </div>
      <button type="button" id="btn-status" class="icon-btn" aria-label="Status">●</button>
    </header>

    <main id="main" class="main">
      <!-- Home menu -->
      <section id="view-home" class="view active">
        <div class="hero-card glass">
          <p class="hero-eyebrow">MLBB Skin Injector</p>
          <h2>Pilih mode</h2>
          <p class="hero-desc">Browse, upgrade, atau inject skin langsung dari browser.</p>
        </div>
        <nav class="menu-grid" id="menu-grid">
          <button class="menu-btn" data-mode="heroes">
            <span class="menu-icon">🦸</span>
            <span class="menu-label">Browse Hero</span>
            <span class="menu-hint">Semua hero</span>
          </button>
          <button class="menu-btn" data-mode="roles">
            <span class="menu-icon">⚔️</span>
            <span class="menu-label">Browse Role</span>
            <span class="menu-hint">Tank, Mage, dll</span>
          </button>
          <button class="menu-btn" data-mode="search">
            <span class="menu-icon">🔍</span>
            <span class="menu-label">Search Skin</span>
            <span class="menu-hint">Cari cepat</span>
          </button>
          <button class="menu-btn accent" data-mode="upgrade">
            <span class="menu-icon">⬆️</span>
            <span class="menu-label">Upgrade Skin</span>
            <span class="menu-hint">Skin upgrade</span>
          </button>
          <button class="menu-btn" data-mode="custom">
            <span class="menu-icon">📦</span>
            <span class="menu-label">Custom Bundle</span>
            <span class="menu-hint">Paket custom</span>
          </button>
          <button class="menu-btn" data-mode="effects">
            <span class="menu-icon">✨</span>
            <span class="menu-label">Effects</span>
            <span class="menu-hint">Recall, emote</span>
          </button>
        </nav>
      </section>

      <!-- List view (heroes, roles, upgrade, etc) -->
      <section id="view-list" class="view">
        <div class="search-bar glass" id="list-search-wrap">
          <input type="search" id="list-search" placeholder="Filter..." autocomplete="off" enterkeyhint="search" />
        </div>
        <div id="list-items" class="list-items"></div>
      </section>

      <!-- Skin grid -->
      <section id="view-skins" class="view">
        <div class="search-bar glass" id="skin-search-wrap">
          <input type="search" id="skin-search" placeholder="Filter skin..." autocomplete="off" />
        </div>
        <div id="skin-grid" class="skin-grid"></div>
      </section>

      <!-- Status -->
      <section id="view-status" class="view">
        <div class="status-card glass" id="status-card">
          <div class="loader"></div>
          <p>Memuat status...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Inject confirmation modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card glass">
      <div class="modal-banner-wrap">
        <img id="modal-img" src="" alt="" class="modal-banner" />
      </div>
      <h3 id="modal-title" class="modal-title">Inject skin?</h3>
      <p id="modal-sub" class="modal-sub"></p>
      <div class="modal-actions">
        <button type="button" id="modal-no" class="btn btn-ghost">Tidak</button>
        <button type="button" id="modal-yes" class="btn btn-primary">Ya, Inject</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="status"></div>

  <!-- Loading overlay -->
  <div id="loading" class="loading-overlay hidden">
    <div class="loader lg"></div>
    <p id="loading-text">Memuat...</p>
  </div>

  <script src="/js/app.js" type="module"></script>
</body>
</html>
